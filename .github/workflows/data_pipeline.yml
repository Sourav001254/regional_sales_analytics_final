name: Data Analytics Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: sudo apt-get install -y libssl-dev libffi-dev
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install -r requirements.txt
        pip install pytest-cov flake8 pandera

    - name: Verify imports
      run: python -c "import pandas, sklearn, statsmodels, folium, reportlab; print('All imports OK')"

    - name: Lint with flake8
      run: flake8 *.py --max-line-length=120 --ignore=E501,W503
        
    - name: Run Data Cleaning Script
      run: |
        python data_cleaning.py

    - name: Validate Data Schema
      run: |
        python validate_schema.py
        
    - name: Run tests with coverage
      run: |
        pytest test_data_pipeline.py --cov=. --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        
    - name: Run EDA and Report Gen
      run: |
        python eda_analysis.py
        python generate_pdf.py
        
    - name: Archive artifacts
      uses: actions/upload-artifact@v4
      with:
        name: executive-report
        path: Executive_Report.pdf
